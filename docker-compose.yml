services:
  db:
    image: timescale/timescaledb:latest-pg15
    container_name: badday_db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=badday
      - POSTGRES_PASSWORD=badday
      - POSTGRES_DB=badday
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: badday_redis
    ports:
      - "6379:6379"

  api:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    env_file:
      - .env
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
