services:
  api:
    build: .
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://badday:badday@db:5432/badday
      - REDIS_URL=redis://redis:6379
    depends_on:
      - db
      - redis
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  db:
    image: timescale/timescaledb:latest-pg15
    container_name: badday_db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=badday
      - POSTGRES_PASSWORD=badday
      - POSTGRES_DB=badday
    volumes:
      - timescale_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: badday_redis
    ports:
      - "6379:6379"

volumes:
  timescale_data:
