<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Bad Day Index</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
    <style>
        :root {
            --bg-dark: #0a0a0f;
            --ocean-blue: #0d1b2a;
            --panel-bg: #111827;
            --text-white: #ffffff;
            --no-data: #1a1a2e;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-white);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        #header {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            pointer-events: none;
        }

        #header h1 {
            margin: 0;
            font-size: 2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #subtitle {
            margin: 5px 0;
            opacity: 0.7;
            font-size: 0.9rem;
        }

        #date-display {
            font-size: 0.8rem;
            opacity: 0.5;
        }

        #map-container {
            width: 100vw;
            height: 100vh;
            background-color: var(--ocean-blue);
        }

        svg {
            width: 100%;
            height: 100%;
        }

        .country {
            stroke: #000;
            stroke-width: 0.2px;
            cursor: pointer;
            transition: fill 0.2s;
        }

        .country:hover {
            filter: brightness(1.2);
        }

        .convergence {
            animation: pulse-border 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse-border {
            0%, 100% { stroke: #ff0000; stroke-width: 0.5px; }
            50% { stroke: #ff0000; stroke-width: 2px; }
        }

        #legend {
            position: absolute;
            bottom: 40px;
            left: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 0.8rem;
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 20px;
        }

        #legend-gradient {
            width: 200px;
            height: 12px;
            background: linear-gradient(to right, #1a3a2a, #8b6914, #8b1a1a);
            border-radius: 6px;
        }

        #tooltip {
            position: absolute;
            pointer-events: none;
            background: rgba(0, 0, 0, 0.9);
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 0.85rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 100;
        }

        #detail-panel {
            position: fixed;
            top: 0;
            right: 0;
            height: 100%;
            width: 320px;
            background-color: var(--panel-bg);
            box-shadow: -5px 0 15px rgba(0,0,0,0.5);
            padding: 40px 30px;
            box-sizing: border-box;
            z-index: 200;
            transform: translateX(100%);
            transition: transform 0.3s ease-out;
        }

        #detail-panel.open {
            transform: translateX(0);
        }

        #close-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            opacity: 0.5;
        }

        #close-panel:hover {
            opacity: 1;
        }

        #panel-country {
            margin: 0 0 10px 0;
            font-size: 1.5rem;
        }

        #panel-score {
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 30px;
            color: #ff4d4d;
        }

        .signal-bar-container {
            margin-bottom: 20px;
        }

        .signal-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
        }

        .signal-bar-bg {
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            overflow: hidden;
        }

        .signal-bar-fill {
            height: 100%;
            background: #8b1a1a;
            border-radius: 3px;
        }

        .convergence-warning {
            background: rgba(255, 0, 0, 0.2);
            border: 1px solid #ff0000;
            color: #ffcccc;
            padding: 10px;
            border-radius: 4px;
            font-size: 0.8rem;
            margin-bottom: 30px;
            display: none;
        }

        .section-header {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.4);
            margin: 30px 0 15px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 5px;
        }

        .source-link {
            display: block;
            color: #4da6ff;
            text-decoration: none;
            font-size: 0.85rem;
            margin-bottom: 8px;
        }

        .source-link:hover {
            text-decoration: underline;
        }

        .headline-link {
            display: block;
            color: var(--text-white);
            text-decoration: none;
            font-size: 0.85rem;
            margin-bottom: 15px;
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 4px;
            border-left: 2px solid #8b1a1a;
        }

        .headline-link:hover {
            background: rgba(255,255,255,0.1);
        }

        .headline-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            opacity: 0.6;
            margin-bottom: 4px;
        }

        #panel-loader {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--panel-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
            display: none;
        }

        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid #ff4d4d;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Ticker Styles */
        #ticker-wrap {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 36px;
            background: #0d0d1a;
            border-top: 1px solid #333;
            overflow: hidden;
            display: flex;
            align-items: center;
            z-index: 1000;
        }

        @keyframes ticker-scroll {
            0% { transform: translateX(100vw); }
            100% { transform: translateX(-100%); }
        }

        #ticker-content {
            display: inline-block;
            white-space: nowrap;
            animation: ticker-scroll 60s linear infinite;
        }

        #ticker-content:hover {
            animation-play-state: paused;
        }

        .ticker-item {
            display: inline-block;
            color: #fff;
            text-decoration: none;
            font-size: 0.85rem;
            padding: 0 20px;
        }

        .ticker-item:hover {
            color: #ff4d4d;
        }

        .ticker-dot {
            color: #ff0000;
        }
    </style>
</head>
<body>
    <div id="header">
        <h1>Global Bad Day Index</h1>
        <p id="subtitle">Mapping moments when everything went wrong simultaneously</p>
        <p id="date-display">Today: March 16, 2026</p>
    </div>

    <div id="map-container">
        <svg id="map"></svg>
    </div>

    <div id="legend">
        <span>Good day</span>
        <div id="legend-gradient"></div>
        <span>Bad day</span>
    </div>

    <div id="tooltip" style="display:none"></div>

    <div id="detail-panel">
        <button id="close-panel">×</button>
        <div id="panel-loader"><div class="spinner"></div></div>
        <h2 id="panel-country">United States</h2>
        <div id="panel-score">48%</div>
        <div id="convergence-msg" class="convergence-warning">CONVERGENCE EVENT: All triggers activated</div>
        
        <div class="section-header">Signals</div>
        <div id="panel-signals"></div>

        <div class="section-header">Sources</div>
        <div id="panel-sources"></div>

        <div class="section-header">Latest Headlines</div>
        <div id="panel-headlines"></div>
    </div>

    <div id="ticker-wrap">
        <div id="ticker-content">
            <span style="color:rgba(255,255,255,0.4); font-size: 0.8rem; padding-left: 20px;">No headlines yet — trigger /ingest/gdelt to populate</span>
        </div>
    </div>

    <div id="legend">
        <span>Good day</span>
        <div id="legend-gradient"></div>
        <span>Bad day</span>
    </div>

    <script>
        const numericToAlpha2 = {
          4:"AF", 8:"AL", 12:"DZ", 24:"AO", 31:"AZ", 32:"AR", 36:"AU", 40:"AT", 48:"BH", 50:"BD", 
          51:"AM", 56:"BE", 64:"BT", 68:"BO", 70:"BA", 72:"BW", 76:"BR", 90:"SB", 100:"BG", 104:"MM", 
          112:"BY", 116:"KH", 120:"CM", 124:"CA", 144:"LK", 152:"CL", 156:"CN", 170:"CO", 178:"CG", 180:"CD", 
          188:"CR", 191:"HR", 192:"CU", 196:"CY", 203:"CZ", 204:"BJ", 208:"DK", 218:"EC", 222:"SV", 231:"ET", 
          232:"ER", 242:"FJ", 246:"FI", 250:"FR", 262:"DJ", 266:"GA", 268:"GE", 275:"PS", 276:"DE", 288:"GH", 
          300:"GR", 320:"GT", 324:"GN", 328:"GY", 332:"HT", 340:"HN", 348:"HU", 356:"IN", 360:"ID", 364:"IR", 
          368:"IQ", 372:"IE", 376:"IL", 380:"IT", 384:"CI", 388:"JM", 392:"JP", 398:"KZ", 400:"JO", 404:"KE", 
          408:"KP", 410:"KR", 414:"KW", 417:"KG", 418:"LA", 422:"LB", 430:"LR", 434:"LY", 440:"LT", 442:"LU", 
          450:"MG", 454:"MW", 458:"MY", 462:"MV", 466:"ML", 470:"MT", 478:"MR", 484:"MX", 496:"MN", 498:"MD", 
          499:"ME", 504:"MA", 508:"MZ", 512:"OM", 516:"NA", 520:"NR", 524:"NP", 528:"NL", 548:"VU", 554:"NZ", 
          558:"NI", 562:"NE", 566:"NG", 578:"NO", 583:"FM", 584:"MH", 585:"PW", 586:"PK", 591:"PA", 598:"PG", 
          600:"PY", 604:"PE", 608:"PH", 616:"PL", 620:"PT", 626:"TL", 630:"PR", 634:"QA", 642:"RO", 643:"RU", 
          646:"RW", 682:"SA", 686:"SN", 688:"RS", 694:"SL", 702:"SG", 703:"SK", 704:"VN", 705:"SI", 706:"SO", 
          710:"ZA", 716:"ZW", 724:"ES", 728:"SS", 729:"SD", 740:"SR", 752:"SE", 756:"CH", 760:"SY", 762:"TJ", 
          764:"TH", 768:"TG", 780:"TT", 784:"AE", 788:"TN", 792:"TR", 795:"TM", 800:"UG", 804:"UA", 807:"MK", 
          818:"EG", 826:"GB", 834:"TZ", 840:"US", 854:"BF", 858:"UY", 860:"UZ", 862:"VE", 882:"WS", 887:"YE", 
          894:"ZM", 776:"TO"
        };

        const countryNames = {
            "AF": "Afghanistan", "AL": "Albania", "DZ": "Algeria", "AO": "Angola", "AR": "Argentina",
            "AU": "Australia", "AT": "Austria", "AZ": "Azerbaijan", "BH": "Bahrain", "BD": "Bangladesh",
            "AM": "Armenia", "BE": "Belgium", "BT": "Bhutan", "BO": "Bolivia", "BA": "Bosnia",
            "BW": "Botswana", "BR": "Brazil", "SB": "Solomon Islands", "BG": "Bulgaria", "MM": "Myanmar",
            "BY": "Belarus", "KH": "Cambodia", "CM": "Cameroon", "CA": "Canada", "LK": "Sri Lanka",
            "CL": "Chile", "CN": "China", "CO": "Colombia", "CG": "Congo", "CD": "DR Congo",
            "CR": "Costa Rica", "HR": "Croatia", "CU": "Cuba", "CY": "Cyprus", "CZ": "Czech Republic",
            "BJ": "Benin", "DK": "Denmark", "EC": "Ecuador", "SV": "El Salvador", "ET": "Ethiopia",
            "ER": "Eritrea", "FJ": "Fiji", "FI": "Finland", "FR": "France", "DJ": "Djibouti",
            "GA": "Gabon", "GE": "Georgia", "PS": "Palestine", "DE": "Germany", "GH": "Ghana",
            "GR": "Greece", "GT": "Guatemala", "GN": "Guinea", "GY": "Guyana", "HT": "Haiti",
            "HN": "Honduras", "HU": "Hungary", "IN": "India", "ID": "Indonesia", "IR": "Iran",
            "IQ": "Iraq", "IE": "Ireland", "IL": "Israel", "IT": "Italy", "CI": "Ivory Coast",
            "JM": "Jamaica", "JP": "Japan", "KZ": "Kazakhstan", "JO": "Jordan", "KE": "Kenya",
            "KP": "North Korea", "KR": "South Korea", "KW": "Kuwait", "KG": "Kyrgyzstan", "LA": "Laos",
            "LB": "Lebanon", "LR": "Liberia", "LY": "Libya", "LT": "Lithuania", "LU": "Luxembourg",
            "MG": "Madagascar", "MW": "Malawi", "MY": "Malaysia", "MV": "Maldives", "ML": "Mali",
            "MT": "Malta", "MR": "Mauritania", "MX": "Mexico", "MN": "Mongolia", "MD": "Moldova",
            "ME": "Montenegro", "MA": "Morocco", "MZ": "Mozambique", "OM": "Oman", "NA": "Namibia",
            "NR": "Nauru", "NP": "Nepal", "NL": "Netherlands", "VU": "Vanuatu", "NZ": "New Zealand",
            "NI": "Nicaragua", "NE": "Niger", "NG": "Nigeria", "NO": "Norway", "FM": "Micronesia",
            "MH": "Marshall Islands", "PW": "Palau", "PK": "Pakistan", "PA": "Panama", "PG": "Papua New Guinea",
            "PY": "Paraguay", "PE": "Peru", "PH": "Philippines", "PL": "Poland", "PT": "Portugal",
            "TL": "Timor-Leste", "PR": "Puerto Rico", "QA": "Qatar", "RO": "Romania", "RU": "Russia",
            "RW": "Rwanda", "SA": "Saudi Arabia", "SN": "Senegal", "RS": "Serbia", "SL": "Sierra Leone",
            "SG": "Singapore", "SK": "Slovakia", "VN": "Vietnam", "SI": "Slovenia", "SO": "Somalia",
            "ZA": "South Africa", "ZW": "Zimbabwe", "ES": "Spain", "SS": "South Sudan", "SD": "Sudan",
            "SR": "Suriname", "SE": "Sweden", "CH": "Switzerland", "SY": "Syria", "TJ": "Tajikistan",
            "TH": "Thailand", "TG": "Togo", "TT": "Trinidad and Tobago", "AE": "United Arab Emirates", "TN": "Tunisia",
            "TR": "Turkey", "TM": "Turkmenistan", "UG": "Uganda", "UA": "Ukraine", "MK": "North Macedonia",
            "EG": "Egypt", "GB": "United Kingdom", "TZ": "Tanzania", "US": "United States", "BF": "Burkina Faso",
            "UY": "Uruguay", "UZ": "Uzbekistan", "VE": "Venezuela", "WS": "Samoa", "YE": "Yemen",
            "ZM": "Zambia", "TO": "Tonga"
        };

        const newsLabels = {
            "reuters.com": "Reuters",
            "bbc.com": "BBC News",
            "bbc.co.uk": "BBC News",
            "aljazeera.com": "Al Jazeera",
            "cnn.com": "CNN",
            "foxnews.com": "Fox News",
            "theguardian.com": "The Guardian",
            "nytimes.com": "NYT",
            "washingtonpost.com": "Washington Post",
            "bloomberg.com": "Bloomberg",
            "apnews.com": "AP News",
            "telegraph.co.uk": "The Telegraph",
            "independent.co.uk": "The Independent",
            "news.sky.com": "Sky News",
            "lemonde.fr": "Le Monde",
            "dw.com": "DW",
            "france24.com": "France 24"
        };

        function getFriendlyLabel(url, sourceName) {
            if (!url) return sourceName;
            const domain = Object.keys(newsLabels).find(d => url.includes(d));
            return domain ? newsLabels[domain] : (sourceName || "News Source");
        }

        const colorScale = d3.scaleSequential()
            .interpolator(t => {
                if (t <= 0.5) return d3.interpolateRgb("#1a3a2a", "#8b6914")(t * 2);
                return d3.interpolateRgb("#8b6914", "#8b1a1a")((t - 0.5) * 2);
            })
            .domain([0, 1]);

        const svg = d3.select("#map");
        const tooltip = d3.select("#tooltip");
        const panel = d3.select("#detail-panel");

        async function init() {
            try {
                const [world, scores] = await Promise.all([
                    d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json'),
                    d3.json('http://localhost:8000/scores/today')
                ]);

                const scoreMap = {};
                scores.forEach(s => {
                    scoreMap[s.country_code] = s;
                });

                const countries = topojson.feature(world, world.objects.countries).features;
                const projection = d3.geoNaturalEarth1().fitSize([window.innerWidth, window.innerHeight], {type: "Sphere"});
                const path = d3.geoPath().projection(projection);

                svg.append("g")
                    .selectAll("path")
                    .data(countries)
                    .enter()
                    .append("path")
                    .attr("d", path)
                    .attr("class", d => {
                        const alpha2 = numericToAlpha2[d.id];
                        const scoreData = scoreMap[alpha2];
                        return `country ${scoreData && scoreData.convergence_flag ? 'convergence' : ''}`;
                    })
                    .attr("fill", d => {
                        const alpha2 = numericToAlpha2[d.id];
                        const scoreData = scoreMap[alpha2];
                        return scoreData ? colorScale(scoreData.bad_day_score) : "var(--no-data)";
                    })
                    .on("mouseover", (event, d) => {
                        const alpha2 = numericToAlpha2[d.id];
                        const scoreData = scoreMap[alpha2];
                        const name = countryNames[alpha2] || d.properties.name;
                        
                        tooltip.style("display", "block")
                            .html(`<strong>${name}</strong><br>Bad Day Score: ${scoreData ? (scoreData.bad_day_score * 100).toFixed(0) : 'No Data'}%`);
                    })
                    .on("mousemove", (event) => {
                        tooltip.style("left", (event.pageX + 10) + "px")
                            .style("top", (event.pageY - 20) + "px");
                    })
                    .on("mouseout", () => {
                        tooltip.style("display", "none");
                    })
                    .on("click", (event, d) => {
                        const alpha2 = numericToAlpha2[d.id];
                        const name = countryNames[alpha2] || d.properties.name;
                        
                        if (alpha2) {
                            showDetail(name, alpha2);
                        }
                    });

                // Detail Panel Logic
                d3.select("#close-panel").on("click", () => {
                    panel.classed("open", false);
                });

                updateTicker();
                setInterval(updateTicker, 600000); // Refresh every 10 mins
            } catch (error) {
                console.error("Initialization failed:", error);
            }
        }

        async function updateTicker() {
            try {
                const response = await fetch('http://localhost:8000/headlines/global');
                const data = await response.json();
                
                const tickerContent = d3.select("#ticker-content");
                tickerContent.html("");

                if (data.headlines && data.headlines.length > 0) {
                    data.headlines.forEach(h => {
                        const label = getFriendlyLabel(h.url, h.source_name);
                        tickerContent.append("a")
                            .attr("href", h.url)
                            .attr("target", "_blank")
                            .attr("rel", "noopener")
                            .attr("class", "ticker-item")
                            .html(`<span class="ticker-dot">🔴</span>&nbsp; ${h.country_name} — ${label} &nbsp;&nbsp;&nbsp;`);
                    });
                } else {
                    tickerContent.html(`<span style="color:rgba(255,255,255,0.4); font-size: 0.8rem; padding-left: 20px;">No headlines yet — trigger /ingest/gdelt to populate</span>`);
                }
            } catch (err) {
                console.error("Ticker fetch failed:", err);
            }
        }

        async function showDetail(name, countryCode) {
            d3.select("#panel-country").text(name);
            d3.select("#panel-loader").style("display", "flex");
            panel.classed("open", true);
            
            try {
                const response = await fetch(`http://localhost:8000/sources/${countryCode}`);
                const data = await response.json();
                
                if (data.status === "error") {
                    d3.select("#panel-score").text("N/A");
                    d3.select("#panel-signals").html("<p style='font-size:0.8rem;opacity:0.5'>No signal data available</p>");
                    d3.select("#panel-sources").html("");
                    d3.select("#panel-headlines").html("");
                    return;
                }

                d3.select("#panel-score").text((data.bad_day_score * 100).toFixed(0) + "%");
                d3.select("#convergence-msg").style("display", data.convergence_flag ? "block" : "none");
                
                // Signals
                const signalsDiv = d3.select("#panel-signals");
                signalsDiv.html("");
                data.signals.forEach(s => {
                    const container = signalsDiv.append("div").attr("class", "signal-bar-container");
                    container.append("div").attr("class", "signal-label")
                        .html(`<span>${s.label}</span><span>${(s.score * 100).toFixed(0)}%</span>`);
                    
                    const barBg = container.append("div").attr("class", "signal-bar-bg");
                    barBg.append("div").attr("class", "signal-bar-fill")
                        .style("width", (s.score * 100) + "%");
                });

                // Sources
                const sourcesDiv = d3.select("#panel-sources");
                sourcesDiv.html("");
                data.signals.forEach(s => {
                    sourcesDiv.append("a")
                        .attr("href", s.source_url)
                        .attr("target", "_blank")
                        .attr("class", "source-link")
                        .text(`${s.label}: ${s.source_name}`);
                });

                // Headlines
                const headlinesDiv = d3.select("#panel-headlines");
                headlinesDiv.html("");
                if (data.headlines && data.headlines.length > 0) {
                    data.headlines.forEach(h => {
                        const label = getFriendlyLabel(h.url, h.source_name);
                        const truncatedLabel = label.length > 30 ? label.substring(0, 27) + "..." : label;
                        headlinesDiv.append("a")
                            .attr("href", h.url)
                            .attr("target", "_blank")
                            .attr("rel", "noopener")
                            .attr("class", "headline-link")
                            .text(`${truncatedLabel} (Tone: ${h.tone.toFixed(1)})`);
                    });
                } else {
                    headlinesDiv.html("<p style='font-size:0.8rem;opacity:0.5'>No negative headlines today</p>");
                }

            } catch (err) {
                console.error("Failed to fetch sources:", err);
            } finally {
                d3.select("#panel-loader").style("display", "none");
            }
        }


        window.addEventListener("resize", () => {
            // Reposition map on resize if needed
        });

        init();
    </script>
</body>
</html>
